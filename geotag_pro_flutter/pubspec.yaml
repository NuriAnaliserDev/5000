name: geofield_pro_flutter
description: Professional geological field mapping and data collection tool (GeoField Pro).
version: 1.9.0+12

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Location & sensors
  geolocator: ^13.0.1
  sensors_plus: ^6.0.1
  flutter_compass: ^0.8.1

  # Camera & Gallery
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Map + offline caching
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^10.0.0
  # State management
  provider: ^6.1.2

  # Audio recording & playback
  record: ^6.2.0
  audioplayers: ^6.6.0
  share_plus: ^10.0.0
  pdf: ^3.12.0
  printing: ^5.14.3
  wakelock_plus: ^1.5.1
  flutter_map_marker_cluster: ^8.2.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.1
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.3
  file_picker: ^11.0.2
  xml: ^6.6.1
  excel: ^4.0.6
  http: ^1.6.0
  fl_chart: ^1.2.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  archive: ^3.6.1
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  introduction_screen: ^4.0.0
  tutorial_coach_mark: ^1.3.3
  uuid: ^4.5.3
  vector_math: ^2.2.0
  firebase_ai: ^3.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
