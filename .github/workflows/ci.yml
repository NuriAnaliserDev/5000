name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

defaults:
  run:
    working-directory: geofield_pro_flutter

jobs:
  analyze:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Verify ARB key parity
        run: python tool/verify_l10n_arb_keys.py

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: geofield_pro_flutter/coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    name: Android APK (debug)
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: geofield_pro_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

  # Reliz AAB: GitHub Secrets bilan imzolangan; aks holda debug APK artefakt (Gradle reliz guard).
  build-appbundle:
    name: Android App Bundle (release) yoki debug APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: geofield_pro_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure release signing (ixtiyoriy)
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PWD: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          KEY_PWD: ${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KS_B64" ] && [ -n "$STORE_PWD" ] && [ -n "$KEY_PWD" ] && [ -n "$KEY_ALIAS" ]; then
            echo "$KS_B64" | base64 -d > android/ci-release.jks
            {
              echo "storeFile=ci-release.jks"
              echo "storePassword=$STORE_PWD"
              echo "keyPassword=$KEY_PWD"
              echo "keyAlias=$KEY_ALIAS"
            } > android/key.properties
            echo "RELEASE_SIGNED=true" >> "$GITHUB_ENV"
          else
            echo "RELEASE_SIGNED=false" >> "$GITHUB_ENV"
            echo "::notice::GitHub Secrets (ANDROID_KEYSTORE_*) yo'q — debug APK yig'iladi."
          fi

      - name: Build release AAB
        if: env.RELEASE_SIGNED == 'true'
        run: flutter build appbundle --release

      - name: Build debug APK (secrets bo‘lmasa)
        if: env.RELEASE_SIGNED != 'true'
        run: flutter build apk --debug

      - name: Upload AAB
        if: success() && env.RELEASE_SIGNED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: geofield_pro_flutter/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload debug APK
        if: success() && env.RELEASE_SIGNED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-ci
          path: geofield_pro_flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
