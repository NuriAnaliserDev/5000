name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

defaults:
  run:
    working-directory: geofield_pro_flutter

jobs:
  analyze:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Verify ARB key parity
        run: python tool/verify_l10n_arb_keys.py

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: geofield_pro_flutter/coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    name: Android APK (debug)
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: geofield_pro_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

  # Reliz AAB: ichki test / artefakt (key.properties bo‘lmasa debug imzo — Play prod uchun siyosatni [docs/ANDROID_RELEASE.md] ko‘ring)
  build-appbundle:
    name: Android App Bundle (release)
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: geofield_pro_flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: geofield_pro_flutter/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
